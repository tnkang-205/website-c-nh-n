<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huỳnh Hữu Phát</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        .icon{height:30px;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#f9f7f4;--surface:#ffffff;--border:#e8e2db;--text:#2e2a26;--muted:#9a9289;--accent:#b8a99a;--nav-bg:#e8e2db;--nav-hover:#ddd6cc;--card-bg:#eee8e0;--avatar-bg:#c9bfb4;}
        body{font-family:Arial;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;}
        header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;padding:0.85rem 2.5rem;}
        .logo-box{background:var(--card-bg);color:var(--text);font-family:'Bodoni MT','Times New Roman',serif;font-size:1rem;font-weight:400;letter-spacing:0.12em;padding:0.4rem 1.2rem;border-radius:4px;text-transform:uppercase;}
        .icon-pill{background:var(--card-bg);color:var(--muted);font-size:0.75rem;letter-spacing:0.08em;padding:0.4rem 1rem;border-radius:4px;text-transform:uppercase;}
        .social-links{margin-left:auto;display:flex;gap:0.5rem;align-items:center;}
        .social-links a{display:flex;align-items:center;justify-content:center;transition:background 0.2s;text-decoration:none;}
        .social-links a:hover{background:var(--nav-hover);}
        nav{width:100%;background:var(--nav-bg);border-bottom:1px solid var(--border);display:flex;justify-content:center;align-items:center;gap:1rem;}
        nav>a,.nav-item>span{font-weight:700;font-family:Arial;display:flex;align-items:center;justify-content:center;color:var(--text);text-decoration:none;font-size:1rem;letter-spacing:0.06em;padding:0.9rem 1.8rem;transition:background 0.15s;cursor:pointer;white-space:nowrap;}
        nav>a:hover,.nav-item:hover>span{background:var(--nav-hover);}
        nav>a.active{background:var(--surface);position:relative;}
        nav>a.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
        .nav-item{position:relative;}
        .dropdown{display:none;position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-top:none;min-width:140px;z-index:100;}
        .nav-item:hover .dropdown{display:block;}
        .dropdown a{display:flex;align-items:center;gap:0.5rem;color:var(--muted);font-size:0.78rem;letter-spacing:0.04em;padding:0.55rem 1.2rem;text-decoration:none;transition:background 0.15s,color 0.15s;}
        .dropdown a:hover{background:var(--bg);color:var(--text);}
        main{max-width:1200px;margin:0 auto;padding:3rem 2.5rem;display:grid;grid-template-columns:3fr 1px 1fr;gap:0 2.5rem;min-height:calc(100vh - 120px);}
        .divider-line{background:black;width:1.5px;min-height:100%;}
        .about-label{font-family:'Times New Roman',serif;font-size:1.7rem;font-weight:300;color:var(--text);margin-bottom:0.6rem;letter-spacing:0.02em;}
        .about-label em{font-style:italic;}
        .about-body{font-size:0.82rem;line-height:1.85;color:var(--muted);margin-bottom:2rem;text-align:justify;}
        .photo-tall{float:right;width:45%;height:400px;background:var(--card-bg);border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0.2rem 0 1rem 1.4rem;}
        .photo-tall img{width:100%;height:100%;object-fit:cover;}
        .photo-placeholder{font-size:0.75rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
        .clearfix::after{content:'';display:table;clear:both;}
        .right-col{padding-top:0.2rem;}
        .profile-name{font-family:'Times New Roman';font-size:30px;font-weight:300;letter-spacing:0.08em;color:var(--text);margin-bottom:1.2rem;}
        .profile-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;}
        .avatar-circle{width:80px;height:80px;border-radius:50%;background:var(--avatar-bg);display:flex;align-items:center;justify-content:center;font-size:0.7rem;letter-spacing:0.06em;color:var(--surface);text-transform:uppercase;overflow:hidden;flex-shrink:0;}
        .avatar-circle img{width:100%;height:100%;object-fit:cover;}
        .intro-box{border:1px solid var(--border);border-radius:4px;padding:1.1rem 1.2rem;background:var(--surface);}
        .intro-box .intro-title{font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);margin-bottom:0.6rem;}
        .intro-box p{font-size:0.8rem;line-height:1.8;color:var(--muted);}
        .tagline{font-size:0.72rem;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);}
        @media(max-width:640px){main{grid-template-columns:1fr;padding:2rem 1.2rem;gap:2rem 0;}.divider-line{display:none;}header{padding:0.75rem 1.2rem;}}
    </style>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
<header>
    <div class="logo-box" id="header-logo">HỮU PHÁT</div>
    <div class="icon-pill">icon</div>
    <div class="social-links">
        <a href="#" target="_blank" id="link-facebook"><img class="icon" src="icon face.png" /></a>
        <a href="#" target="_blank" id="link-threads"><img class="icon" src="Picture1.jpg" /></a>
        <a href="#" target="_blank" id="link-instagram"><img class="icon" src="icon ig.png" /></a>
    </div>
</header>
<nav>
    <a href="index.html" class="active">Trang chủ</a>
    <div class="nav-item">
        <span>Đời sống</span>
        <div class="dropdown">
            <a href="Love.html">Love</a>
            <a href="Friend.html">Friends</a>
            <a href="Pet.html">Pet</a>
        </div>
    </div>
    <a href="mylife.html">My life</a>
    <a href="cocmoc.html">Cột mốc</a>
</nav>
<main>
    <div class="left-col">
        <h1 class="about-label">About <em>me</em></h1>
        <div class="clearfix">
            <div class="photo-tall" id="about-photo"><span class="photo-placeholder">Hình</span></div>
            <p class="about-body" id="about-body">Đang tải nội dung...</p>
        </div>
    </div>
    <div class="divider-line"></div>
    <div class="right-col">
        <div class="profile-top">
            <div class="profile-name" id="profile-name">Huỳnh Hữu Phát</div>
            <div class="avatar-circle" id="avatar"><span>Avatar</span></div>
        </div>
        <div class="intro-box">
            <div class="intro-title">Giới thiệu về trang web</div>
            <p id="intro-text">Đây là nơi tôi lưu lại những khoảnh khắc, suy nghĩ và câu chuyện nhỏ trong cuộc sống.</p>
        </div>
        <div class="tagline" id="tagline">sống chậm · yêu thương · chia sẻ</div>
    </div>
</main>
<script>
const REPO='tnkang-205/website-c-nh-n';
const RAW=`https://raw.githubusercontent.com/${REPO}/main`;
function parseFM(text){
    const m=text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    if(!m)return{meta:{},body:text};
    const meta={};
    m[1].split('\n').forEach(l=>{const[k,...v]=l.split(':');if(k)meta[k.trim()]=v.join(':').trim().replace(/^["']|["']$/g,'');});
    return{meta,body:m[2].trim()};
}
async function load(){
    try{
        const r=await fetch(`${RAW}/_data/trangchu.md`);
        if(!r.ok)return;
        const{meta,body}=parseFM(await r.text());
        if(meta.ten)document.getElementById('profile-name').textContent=meta.ten;
        if(meta.logo)document.getElementById('header-logo').textContent=meta.logo;
        if(meta.tagline)document.getElementById('tagline').textContent=meta.tagline;
        if(meta.gioi_thieu)document.getElementById('intro-text').textContent=meta.gioi_thieu;
        if(body)document.getElementById('about-body').textContent=body;
        if(meta.anh_chinh)document.getElementById('about-photo').innerHTML=`<img src="${RAW}/${meta.anh_chinh.replace(/^\//,'')}" alt="About"/>`;
        if(meta.avatar)document.getElementById('avatar').innerHTML=`<img src="${RAW}/${meta.avatar.replace(/^\//,'')}" alt="Avatar"/>`;
        if(meta.facebook){document.getElementById('link-facebook').href=meta.facebook;}
        if(meta.threads){document.getElementById('link-threads').href=meta.threads;}
        if(meta.instagram){document.getElementById('link-instagram').href=meta.instagram;}
    }catch(e){}
}
load();
</script>
</body>
</html>
