<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cột mốc — Huỳnh Hữu Phát</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        .icon{height:30px;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#f9f7f4;--surface:#ffffff;--border:#e8e2db;--text:#2e2a26;--muted:#9a9289;--accent:#b8a99a;--nav-bg:#e8e2db;--nav-hover:#ddd6cc;--card-bg:#eee8e0;}
        body{font-family:Arial,sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;}
        header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;padding:0.85rem 2.5rem;}
        .logo-box{background:var(--card-bg);color:var(--text);font-family:'Bodoni MT','Times New Roman',serif;font-size:1rem;font-weight:400;letter-spacing:0.12em;padding:0.4rem 1.2rem;border-radius:4px;text-transform:uppercase;}
        .icon-pill{background:var(--card-bg);color:var(--muted);font-size:0.75rem;letter-spacing:0.08em;padding:0.4rem 1rem;border-radius:4px;text-transform:uppercase;}
        .social-links{margin-left:auto;display:flex;gap:0.5rem;align-items:center;}
        .social-links a{display:flex;align-items:center;justify-content:center;transition:background 0.2s;text-decoration:none;}
        .social-links a:hover{background:var(--nav-hover);}
        nav{width:100%;background:var(--nav-bg);border-bottom:1px solid var(--border);display:flex;justify-content:center;align-items:center;gap:1rem;}
        nav>a,.nav-item>span{font-weight:700;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;color:var(--text);text-decoration:none;font-size:1rem;letter-spacing:0.06em;padding:0.9rem 1.8rem;transition:background 0.15s;cursor:pointer;white-space:nowrap;}
        nav>a:hover,.nav-item:hover>span{background:var(--nav-hover);}
        nav>a.active{background:var(--surface);position:relative;}
        nav>a.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
        .nav-item{position:relative;}
        .dropdown{display:none;position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-top:none;min-width:140px;z-index:100;}
        .nav-item:hover .dropdown{display:block;}
        .dropdown a{display:flex;align-items:center;gap:0.5rem;color:var(--muted);font-size:0.78rem;letter-spacing:0.04em;padding:0.55rem 1.2rem;text-decoration:none;transition:background 0.15s,color 0.15s;font-weight:400;}
        .dropdown a:hover{background:var(--bg);color:var(--text);}

        /* ─── MAIN ─── */
        main{max-width:780px;margin:0 auto;padding:3rem 2rem 5rem;}
        .page-label{font-family:'Times New Roman',serif;font-size:1.7rem;font-weight:300;color:var(--text);margin-bottom:2.5rem;letter-spacing:0.02em;}
        .page-label em{font-style:italic;}

        /* ─── TIMELINE ─── */
        .timeline{position:relative;padding-left:2.5rem;}
        .timeline::before{content:'';position:absolute;left:0.55rem;top:0;bottom:0;width:1.5px;background:var(--border);}

        .timeline-item{position:relative;margin-bottom:2.5rem;}
        .timeline-item::before{content:'';position:absolute;left:-2.05rem;top:0.35rem;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 0 0 1.5px var(--accent);}

        .timeline-year{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:0.3rem;}
        .timeline-title{font-family:'Times New Roman',serif;font-size:1.1rem;font-weight:400;color:var(--text);margin-bottom:0.5rem;line-height:1.35;}
        .timeline-desc{font-size:0.83rem;line-height:1.85;color:var(--muted);text-align:justify;}
        .timeline-img{width:100%;aspect-ratio:16/9;background:var(--card-bg);border-radius:6px;overflow:hidden;margin:0.8rem 0;display:flex;align-items:center;justify-content:center;}
        .timeline-img img{width:100%;height:100%;object-fit:cover;}

        .loading{text-align:center;padding:3rem;color:var(--muted);font-size:0.85rem;letter-spacing:0.08em;}

        @media(max-width:640px){
            main{padding:2rem 1rem 4rem;}
            header{padding:0.75rem 1rem;}
            .timeline{padding-left:1.8rem;}
        }
    </style>
</head>
<body>
<header>
    <div class="logo-box">HỮU PHÁT</div>
    <div class="icon-pill">icon</div>
    <div class="social-links">
        <a href="https://facebook.com" target="_blank"><img class="icon" src="icon face.png" /></a>
        <a href="https://threads.net" target="_blank"><img class="icon" src="Picture1.jpg" /></a>
        <a href="https://instagram.com" target="_blank"><img class="icon" src="icon ig.png" /></a>
    </div>
</header>
<nav>
    <a href="index.html">Trang chủ</a>
    <div class="nav-item">
        <span>Đời sống</span>
        <div class="dropdown">
            <a href="Love.html">Love</a>
            <a href="Friend.html">Friends</a>
            <a href="Pet.html">Pet</a>
        </div>
    </div>
    <a href="mylife.html">My life</a>
    <a href="cocmoc.html" class="active">Cột mốc</a>
</nav>

<main>
    <h1 class="page-label">Cột <em>mốc</em></h1>
    <div class="timeline" id="timeline">
        <div class="loading">Đang tải...</div>
    </div>
</main>

<script>
const REPO='tnkang-205/website-c-nh-n';
const FOLDER='_posts/cocmoc';
const RAW=`https://raw.githubusercontent.com/${REPO}/main`;
const API=`https://api.github.com/repos/${REPO}/contents/${FOLDER}`;

function parseFM(text){
    const m=text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    if(!m)return{meta:{},body:text};
    const meta={};
    m[1].split('\n').forEach(l=>{const[k,...v]=l.split(':');if(k)meta[k.trim()]=v.join(':').trim().replace(/^["']|["']$/g,'');});
    return{meta,body:m[2].trim()};
}

function formatYear(dateStr){
    if(!dateStr)return'';
    const d=new Date(dateStr);
    if(isNaN(d))return dateStr;
    return d.toLocaleDateString('vi-VN',{day:'2-digit',month:'long',year:'numeric'});
}

async function loadTimeline(){
    const tl=document.getElementById('timeline');
    try{
        const res=await fetch(API);
        if(!res.ok)throw new Error();
        const files=await res.json();
        const mdFiles=files.filter(f=>f.name.endsWith('.md'));
        if(!mdFiles.length){tl.innerHTML='<div class="loading">Chưa có sự kiện nào.</div>';return;}
        const items=await Promise.all(mdFiles.map(async f=>{
            const r=await fetch(f.download_url);
            return parseFM(await r.text());
        }));
        // Sort by date ascending (timeline từ cũ đến mới)
        items.sort((a,b)=>new Date(a.meta.date)-new Date(b.meta.date));

        tl.innerHTML=items.map(({meta,body})=>`
            <div class="timeline-item">
                <div class="timeline-year">${formatYear(meta.date)}</div>
                <div class="timeline-title">${meta.title||'Sự kiện'}</div>
                ${meta.anh?`<div class="timeline-img"><img src="${RAW}/${meta.anh.replace(/^\//,'')}" alt="${meta.title||''}" /></div>`:''}
                ${body?`<div class="timeline-desc">${body.replace(/\n/g,'<br>')}</div>`:''}
            </div>`).join('');
    }catch(e){
        tl.innerHTML='<div class="loading">Chưa có sự kiện nào.</div>';
    }
}
loadTimeline();
</script>
</body>
</html>
